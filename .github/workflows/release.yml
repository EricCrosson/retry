---
name: Release

on:
  push:
    branches:
      - master
      - next
      - next-major
      - beta
      - alpha
      - "[0-9]+.[0-9]+.x"
      - "[0-9]+.x"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: semantic-release-action/rust/.github/workflows/release-binary.yml@v5
    with:
      disable-semantic-release-cargo: true
    secrets:
      cargo-registry-token: unused

  cachix:
    needs: release
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: ericcrosson-retry
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - run: nix build
      - run: cachix push ericcrosson-retry ./result
